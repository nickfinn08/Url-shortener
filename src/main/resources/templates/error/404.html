<!DOCTYPE html>
<html lang="en"
      xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{layout}">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>404 - Short URL Not Found</title>
</head>
<body>
<div layout:fragment="content">
    <div class="d-flex align-items-center justify-content-center" style="min-height: 70vh;">
        <div class="text-center">
            <h1 class="display-3 fw-bold text-danger mb-3">404</h1>
            <h2 class="mb-3">Short URL Not Found</h2>
            <p class="text-muted mb-4">
                The short link you opened doesn’t exist or may have expired.
            </p>
            <a th:href="@{/}" class="btn btn-primary">Go to Home</a>
        </div>
    </div>
</div>
</body>
</html>
